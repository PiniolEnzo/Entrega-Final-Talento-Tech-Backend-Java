spring:
  application:
    name: TechLab
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      dialect: org.hibernate.dialect.MySQL5Dialect
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION} # 15 minutes in milliseconds
